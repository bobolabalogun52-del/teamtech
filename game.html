<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC Fun Land — Letters, Numbers & Puzzles!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#FF8FAB;
    --yellow:#FFD93D;
    --sky:#7EC8E3;
    --green:#6BCB77;
    --plum:#5B3A8E;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    overflow-x:hidden;
    font-family:'Quicksand', sans-serif;
    background: linear-gradient(135deg, #a8e6ff, #ffd6e8, #fff3b0, #c9f7c5);
    background-size: 400% 400%;
    animation: bgShift 18s ease infinite;
    position:relative;
  }
  @keyframes bgShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  #bgDecor{ position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .floatie{
    position:absolute; opacity:.55; animation-name:floaty; animation-iteration-count:infinite; animation-timing-function:ease-in-out;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.12));
  }
  @keyframes floaty{
    0%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-26px) rotate(8deg); }
    100%{ transform:translateY(0) rotate(0deg); }
  }

  .wrap{ position:relative; z-index:1; max-width:980px; margin:0 auto; padding:18px 16px 60px; text-align:center; }

  header h1{
    font-family:'Baloo 2', sans-serif;
    font-size:clamp(2rem, 6vw, 3.2rem);
    color:var(--plum);
    text-shadow: 3px 3px 0 #fff, 0 6px 14px rgba(0,0,0,.15);
    margin:6px 0 2px;
  }
  header p{ font-weight:600; color:#4a3a66; margin:0 0 16px; font-size:1.05rem; }

  .controls{ display:flex; flex-wrap:wrap; justify-content:center; align-items:center; gap:12px; margin-bottom:14px; }
  .pill-btn{
    font-family:'Baloo 2', sans-serif; font-size:1.05rem; font-weight:700; color:#fff;
    border:none; border-radius:50px; padding:12px 22px; cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.15), 0 7px 14px rgba(0,0,0,.18);
    transition: transform .12s ease;
  }
  .pill-btn:active{ transform:translateY(3px) scale(.97); box-shadow:0 2px 0 rgba(0,0,0,.15);}
  #musicBtn{ background:linear-gradient(145deg,#FF8FAB,#E45D8C); }
  #songBtn{ background:linear-gradient(145deg,#7EC8E3,#3F9FC4); }

  .tabs{ display:flex; justify-content:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .tab-btn{
    font-family:'Baloo 2',sans-serif; font-weight:700; font-size:1rem; color:var(--plum);
    background:#fff; border:none; border-radius:50px; padding:10px 18px; cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.1); transition:transform .12s ease, background .15s ease, color .15s ease;
  }
  .tab-btn.active{ background:linear-gradient(145deg,var(--plum),#7c4fc9); color:#fff; transform:translateY(-2px); }
  .tab-btn:active{ transform:scale(.96); }

  .section{ display:none; }
  .section.active{ display:block; animation:fadeIn .3s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .section-controls{ display:flex; justify-content:center; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .badge{
    font-family:'Baloo 2',sans-serif; font-weight:800; color:var(--plum); background:#fff;
    border-radius:50px; padding:10px 20px; box-shadow:0 4px 10px rgba(0,0,0,.12); font-size:1.05rem;
  }

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(72px,1fr)); gap:12px;
    background:rgba(255,255,255,.55); border-radius:28px; padding:20px; backdrop-filter:blur(2px);
    box-shadow:0 10px 30px rgba(0,0,0,.08);
  }
  .tile{
    position:relative; aspect-ratio:1; border:none; border-radius:18px;
    font-family:'Baloo 2', sans-serif; font-size:clamp(1.2rem,4.5vw,1.9rem); font-weight:800;
    color:#fff; text-shadow:0 2px 4px rgba(0,0,0,.25); cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.15), 0 8px 14px rgba(0,0,0,.18);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .tile:hover{ transform:translateY(-4px) scale(1.06); }
  .tile:active{ transform:translateY(3px) scale(.93); box-shadow:0 2px 0 rgba(0,0,0,.15); }
  .tile.singing{ transform:scale(1.18); box-shadow:0 0 0 4px #fff, 0 8px 18px rgba(0,0,0,.3); }
  .tile-star{ position:absolute; top:-8px; right:-6px; font-size:1.1rem; filter:drop-shadow(0 2px 2px rgba(0,0,0,.3)); }
  .num-tile{ border-radius:50%; }

  .numbers-grid{ grid-template-columns:repeat(auto-fill, minmax(72px,1fr)); }

  footer{ margin-top:26px; font-size:.9rem; color:#5a4a73; font-weight:600; }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(60,30,90,.45); display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .2s ease; z-index:50; padding:16px;
  }
  .modal-overlay.show{ opacity:1; pointer-events:auto; }
  .modal-card{
    background:#fffdf6; border-radius:28px; padding:30px 26px; max-width:340px; width:100%;
    text-align:center; position:relative; box-shadow:0 20px 50px rgba(0,0,0,.3);
    transform:scale(.7); transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-overlay.show .modal-card{ transform:scale(1); }
  .close-btn{ position:absolute; top:12px; right:14px; background:none; border:none; font-size:1.3rem; cursor:pointer; color:#999; }
  .modal-letters{ font-family:'Baloo 2',sans-serif; font-weight:800; font-size:3.4rem; color:var(--plum); }
  .modal-letters span:first-child{ margin-right:8px; }
  .modal-emoji{ font-size:4rem; margin:8px 0; }
  .modal-word{ font-family:'Baloo 2',sans-serif; font-weight:700; font-size:1.6rem; color:#444; margin-bottom:16px; }
  .hear-btn{
    font-family:'Baloo 2',sans-serif; font-weight:700; color:#fff; background:linear-gradient(145deg,var(--green),#3FA34D);
    border:none; border-radius:50px; padding:10px 20px; cursor:pointer; font-size:1rem;
    box-shadow:0 5px 0 rgba(0,0,0,.15);
  }
  .hear-btn:active{ transform:translateY(3px); box-shadow:none; }

  .count-row{ display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin:10px 0; min-height:48px; }
  .count-icon{ font-size:1.8rem; animation:popIn .3s ease backwards; }
  @keyframes popIn{ from{ transform:scale(0); opacity:0;} to{ transform:scale(1); opacity:1;} }

  .song-overlay{
    position:fixed; inset:0; background:rgba(30,20,60,.7); display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:60; padding:16px;
  }
  .song-overlay.show{ opacity:1; pointer-events:auto; }
  .song-card{ text-align:center; max-width:520px; }
  .song-title{ font-family:'Baloo 2',sans-serif; color:#fff; font-size:1.4rem; margin-bottom:10px; }
  .song-letter{
    font-family:'Baloo 2',sans-serif; font-weight:800; font-size:7rem; color:#FFD93D;
    text-shadow:0 6px 0 rgba(0,0,0,.25); line-height:1;
  }
  .song-dots{ display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin-top:18px; }
  .song-dot{
    width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.25); color:#fff;
    font-family:'Baloo 2',sans-serif; font-size:.75rem; font-weight:700; display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease, background .15s ease;
  }
  .song-dot.active{ background:#FFD93D; color:#5B3A8E; transform:scale(1.3); }

  .puzzle-card{
    background:rgba(255,255,255,.7); border-radius:28px; padding:30px 20px; max-width:520px; margin:0 auto;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
  }
  .puzzle-question{ font-family:'Baloo 2',sans-serif; color:var(--plum); font-weight:700; font-size:1.2rem; margin:14px 0; }
  .puzzle-question p{ margin:8px 0 0; }
  .seq-row{ display:flex; justify-content:center; gap:10px; margin:10px 0; flex-wrap:wrap; }
  .seq-box{
    width:54px; height:54px; border-radius:14px; background:linear-gradient(145deg,#fff,#f1eaff);
    display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:800; color:var(--plum);
    box-shadow:0 4px 8px rgba(0,0,0,.12);
  }
  .puzzle-emoji{ font-size:4rem; margin-bottom:6px; }
  .puzzle-options{ display:flex; justify-content:center; gap:14px; margin-top:16px; flex-wrap:wrap; }
  .puzzle-opt{
    font-family:'Baloo 2',sans-serif; font-weight:800; font-size:1.5rem; color:#fff;
    background:linear-gradient(145deg,#7EC8E3,#3F9FC4); border:none; border-radius:16px; width:64px; height:64px; cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.15); transition:transform .12s ease;
  }
  .puzzle-opt:active{ transform:translateY(3px); box-shadow:none; }
  .puzzle-opt:disabled{ cursor:default; opacity:.9; }
  .puzzle-opt.correct{ background:linear-gradient(145deg,var(--green),#3FA34D); }
  .puzzle-opt.wrong{ background:linear-gradient(145deg,#FF6B6B,#D6453F); }
  .puzzle-feedback{ font-family:'Baloo 2',sans-serif; font-weight:700; color:var(--plum); margin-top:14px; min-height:1.4em; }

  .confetti{
    position:fixed; width:9px; height:9px; border-radius:2px; z-index:70; pointer-events:none;
    animation-name:confettiFall; animation-timing-function:ease-out; animation-fill-mode:forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translate(0,0) rotate(0deg); opacity:1; }
    100%{ transform:translate(var(--dx), 60vh) rotate(var(--rot)); opacity:0; }
  }

  .start-overlay{
    position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#a8e6ff,#ffd6e8,#fff3b0); transition:opacity .6s ease;
  }
  .start-overlay.hide{ opacity:0; pointer-events:none; }
  .start-card{ text-align:center; padding:20px; }
  .start-card h1{ font-family:'Baloo 2',sans-serif; font-size:clamp(1.8rem,7vw,2.8rem); color:var(--plum); margin-bottom:6px;}
  .start-card p{ font-weight:600; color:#4a3a66; margin-bottom:20px; }
  #startBtn{
    font-family:'Baloo 2',sans-serif; font-size:1.3rem; font-weight:800; color:#fff;
    background:linear-gradient(145deg,#FF8FAB,#7EC8E3); border:none; border-radius:50px; padding:16px 32px; cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.15), 0 10px 20px rgba(0,0,0,.2);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }

  @media (prefers-reduced-motion: reduce){
    .floatie, #startBtn{ animation:none !important; }
    body{ animation:none !important; }
  }
</style>
</head>
<body>

<div id="bgDecor"></div>

<div class="wrap">
  <header>
    <h1>🌈 ABC Fun Land 🎈</h1>
    <p>Letters, numbers, and puzzles — tap, listen, and learn!</p>
  </header>

  <div class="controls">
    <button class="pill-btn" id="musicBtn" type="button">🔊 Music</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="letters" type="button">🔤 Letters</button>
    <button class="tab-btn" data-tab="numbers" type="button">🔢 Numbers</button>
    <button class="tab-btn" data-tab="puzzles" type="button">🧩 Puzzles</button>
  </div>

  <div class="section active" id="section-letters">
    <div class="section-controls">
      <button class="pill-btn" id="songBtn" type="button">🎵 Sing the ABC Song</button>
      <div class="badge" id="starBadge">⭐ 0 / 26</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="section" id="section-numbers">
    <div class="section-controls">
      <div class="badge" id="numStarBadge">⭐ 0 / 10</div>
    </div>
    <div class="grid numbers-grid" id="numGrid"></div>
  </div>

  <div class="section" id="section-puzzles">
    <div class="puzzle-card">
      <div class="badge" id="puzzleScore">🧩 Score: 0</div>
      <div class="puzzle-question" id="puzzleQuestion"></div>
      <div class="puzzle-options" id="puzzleOptions"></div>
      <div class="puzzle-feedback" id="puzzleFeedback"></div>
    </div>
  </div>

  <footer>Made with ❤️ for little learners</footer>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <button class="close-btn" id="closeModal" type="button">✖</button>
    <div class="modal-letters"><span id="modalUpper">A</span><span id="modalLower">a</span></div>
    <div class="modal-emoji" id="modalEmoji">🍎</div>
    <div class="modal-word" id="modalWord">Apple</div>
    <button class="hear-btn" id="hearAgain" type="button">🔊 Hear it again</button>
  </div>
</div>

<div class="modal-overlay" id="numModal">
  <div class="modal-card">
    <button class="close-btn" id="closeNumModal" type="button">✖</button>
    <div class="modal-letters" id="numBig">3</div>
    <div class="count-row" id="countRow"></div>
    <div class="modal-word" id="numWord">Three</div>
    <button class="hear-btn" id="numHearAgain" type="button">🔊 Hear it again</button>
  </div>
</div>

<div class="song-overlay" id="songOverlay">
  <div class="song-card">
    <div class="song-title">🎵 Sing along! 🎵</div>
    <div class="song-letter" id="songLetter">A</div>
    <div class="song-dots" id="songDots"></div>
  </div>
</div>

<div class="start-overlay" id="startOverlay">
  <div class="start-card">
    <h1>🌈 ABC Fun Land 🎈</h1>
    <p>Tap below to start the music and begin learning!</p>
    <button id="startBtn" type="button">🎉 Let's Play! 🎉</button>
  </div>
</div>

<script>
// ===== Data =====
const LETTERS = {
  A:{word:'Apple', emoji:'🍎'}, B:{word:'Ball', emoji:'⚽'}, C:{word:'Cat', emoji:'🐱'},
  D:{word:'Dog', emoji:'🐶'}, E:{word:'Elephant', emoji:'🐘'}, F:{word:'Fish', emoji:'🐟'},
  G:{word:'Grapes', emoji:'🍇'}, H:{word:'Hat', emoji:'🎩'}, I:{word:'Ice Cream', emoji:'🍦'},
  J:{word:'Juice', emoji:'🧃'}, K:{word:'Kite', emoji:'🪁'}, L:{word:'Lion', emoji:'🦁'},
  M:{word:'Monkey', emoji:'🐵'}, N:{word:'Nut', emoji:'🥜'}, O:{word:'Orange', emoji:'🍊'},
  P:{word:'Pig', emoji:'🐷'}, Q:{word:'Queen', emoji:'👑'}, R:{word:'Rabbit', emoji:'🐰'},
  S:{word:'Sun', emoji:'☀️'}, T:{word:'Tiger', emoji:'🐯'}, U:{word:'Umbrella', emoji:'☂️'},
  V:{word:'Violin', emoji:'🎻'}, W:{word:'Watermelon', emoji:'🍉'}, X:{word:'Xylophone', emoji:'🎹'},
  Y:{word:'Yo-yo', emoji:'🪀'}, Z:{word:'Zebra', emoji:'🦓'}
};
const LETTER_KEYS = Object.keys(LETTERS);

const NUMBERS = [
  {n:1, word:'One', emoji:'⭐'}, {n:2, word:'Two', emoji:'🍓'}, {n:3, word:'Three', emoji:'🍎'},
  {n:4, word:'Four', emoji:'🐠'}, {n:5, word:'Five', emoji:'🎈'}, {n:6, word:'Six', emoji:'🌟'},
  {n:7, word:'Seven', emoji:'🦋'}, {n:8, word:'Eight', emoji:'🐝'}, {n:9, word:'Nine', emoji:'🍪'},
  {n:10, word:'Ten', emoji:'🌼'}
];

const NOTE = {C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,C5:523.25};
const ABC_NOTES = ['C4','C4','G4','G4','A4','A4','G4','F4','F4','E4','E4','D4','D4','C4','G4','G4','F4','F4','E4','E4','D4','D4','C4','G4','G4','F4'];

const PRAISES = [
  "Wow, you're amazing!", "Super job, little star!", "You're so smart!",
  "Great learning today!", "High five! You're doing great!"
];

const FLOATIES = ['🎈','🧸','⚽','🚗','🪁','🎨','🧩','🚂','🎁','🧒','👧','👦','🌈','☁️','🪀','🎀'];

// ===== State =====
let audioCtx = null;
let musicGain = null;
let musicOn = true;
let musicTimer = null;
let songPlaying = false;
let puzzleStarted = false;
let puzzleScoreCount = 0;
const learnedLetters = new Set();
const learnedNumbers = new Set();

// ===== DOM refs =====
let grid, modal, modalUpper, modalLower, modalEmoji, modalWord, starBadge;
let songOverlay, songLetterEl, songDotsEl, musicBtn, startOverlay;
let numGrid, numModal, numBig, numWord, countRow, numStarBadge;
let puzzleQuestion, puzzleOptions, puzzleFeedback, puzzleScoreEl;

function $(id){ return document.getElementById(id); }

// ===== Audio engine =====
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.15;
  musicGain.connect(audioCtx.destination);
}

function playTone(freq, startTime, duration, peak, type){
  type = type || 'sine';
  peak = peak === undefined ? 0.2 : peak;
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(peak, startTime + 0.06);
  env.gain.linearRampToValueAtTime(0, startTime + duration);
  osc.connect(env);
  env.connect(musicGain);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}

const BG_PATTERN = [261.63,329.63,392.00,523.25,392.00,329.63];
function scheduleBgLoop(){
  if(!musicOn || !audioCtx) return;
  const now = audioCtx.currentTime + 0.1;
  const noteDur = 0.55;
  BG_PATTERN.forEach((freq,i)=>{
    playTone(freq, now + i*noteDur, noteDur*0.9, 0.10, 'triangle');
  });
  musicTimer = setTimeout(scheduleBgLoop, BG_PATTERN.length*noteDur*1000);
}

function toggleMusic(){
  initAudio();
  musicOn = !musicOn;
  if(musicOn){
    musicGain.gain.value = 0.15;
    scheduleBgLoop();
    if(musicBtn) musicBtn.textContent = '🔊 Music';
  } else {
    musicGain.gain.value = 0;
    clearTimeout(musicTimer);
    if(musicBtn) musicBtn.textContent = '🔇 Music';
  }
}

// ===== Speech =====
function speak(text, rate, pitch){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate || 0.85;
  u.pitch = pitch || 1.15;
  u.lang = 'en-US';
  window.speechSynthesis.speak(u);
}

// Queue several short utterances back to back without cancelling
// each other, used so the alphabet is spoken aloud while the tune plays.
function speakSequence(items, rate, pitch){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  items.forEach((text)=>{
    const u = new SpeechSynthesisUtterance(text);
    u.rate = rate || 1.05;
    u.pitch = pitch || 1.2;
    u.lang = 'en-US';
    window.speechSynthesis.speak(u);
  });
}

// ===== Confetti =====
function burstConfetti(count){
  count = count || 24;
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF8FAB','#C780FA'];
  for(let i=0;i<count;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (40 + Math.random()*20) + 'vw';
    c.style.top = (30 + Math.random()*10) + 'vh';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.setProperty('--dx', (Math.random()*240-120)+'px');
    c.style.setProperty('--rot', (Math.random()*360)+'deg');
    c.style.animationDuration = (1+Math.random())+'s';
    document.body.appendChild(c);
    setTimeout(()=> c.remove(), 2200);
  }
}

// ===== Letters grid =====
function buildGrid(){
  LETTER_KEYS.forEach((letter, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'tile';
    btn.id = 'tile-' + letter;
    btn.type = 'button';
    const hue = Math.round(idx * (360/LETTER_KEYS.length));
    btn.style.background = `linear-gradient(145deg, hsl(${hue} 85% 65%), hsl(${hue} 85% 50%))`;
    btn.textContent = letter;
    btn.addEventListener('click', ()=> openLetter(letter));
    grid.appendChild(btn);
  });
}

function updateLetterStars(){
  starBadge.textContent = `⭐ ${learnedLetters.size} / ${LETTER_KEYS.length}`;
}

function openLetter(letter){
  initAudio();
  const data = LETTERS[letter];
  modalUpper.textContent = letter;
  modalLower.textContent = letter.toLowerCase();
  modalEmoji.textContent = data.emoji;
  modalWord.textContent = data.word;
  modal.classList.add('show');
  speak(`${letter}. ${letter} is for ${data.word}.`);

  if(!learnedLetters.has(letter)){
    learnedLetters.add(letter);
    updateLetterStars();
    burstConfetti();
    const tile = $('tile-' + letter);
    if(tile && !tile.querySelector('.tile-star')){
      const star = document.createElement('span');
      star.className = 'tile-star';
      star.textContent = '⭐';
      tile.appendChild(star);
    }
    if(learnedLetters.size % 5 === 0){
      setTimeout(()=> speak(PRAISES[Math.floor(Math.random()*PRAISES.length)]), 1700);
    }
  }
}

function closeModal(){
  modal.classList.remove('show');
  window.speechSynthesis.cancel();
}

// ===== ABC Song (sings + speaks the letters together) =====
function buildSongDots(){
  LETTER_KEYS.forEach((letter, i)=>{
    const dot = document.createElement('span');
    dot.className = 'song-dot';
    dot.id = 'dot-' + i;
    dot.textContent = letter;
    songDotsEl.appendChild(dot);
  });
}

function highlightSongLetter(i){
  const letter = LETTER_KEYS[i];
  songLetterEl.textContent = letter;
  const prev = songDotsEl.querySelector('.song-dot.active');
  if(prev) prev.classList.remove('active');
  const dot = $('dot-' + i);
  if(dot) dot.classList.add('active');
  const tile = $('tile-' + letter);
  if(tile){
    tile.classList.add('singing');
    setTimeout(()=> tile.classList.remove('singing'), 400);
  }
}

function playABCSong(){
  if(songPlaying) return;
  initAudio();
  songPlaying = true;
  songOverlay.classList.add('show');
  const dur = 0.45;
  const startCtxTime = audioCtx.currentTime + 0.2;

  // Speak the letters aloud, queued so they play one after another
  // roughly alongside the tune as it plays.
  speakSequence(LETTER_KEYS, 1.1, 1.2);

  LETTER_KEYS.forEach((letter, i)=>{
    const t = startCtxTime + i*dur;
    playTone(NOTE[ABC_NOTES[i]], t, dur*0.92, 0.22, 'sine');
    const delayMs = Math.max(0, (t - audioCtx.currentTime) * 1000);
    setTimeout(()=> highlightSongLetter(i), delayMs);
  });
  const totalMs = LETTER_KEYS.length*dur*1000 + 700;
  setTimeout(finishSong, totalMs);
}

function finishSong(){
  burstConfetti(40);
  setTimeout(()=> speak("Now I know my A B Cs! Great singing, super star!", 0.9, 1.2), 300);
  setTimeout(()=>{
    songOverlay.classList.remove('show');
    songPlaying = false;
  }, 1200);
}

// ===== Numbers =====
function buildNumberGrid(){
  NUMBERS.forEach((item)=>{
    const btn = document.createElement('button');
    btn.className = 'tile num-tile';
    btn.id = 'numtile-' + item.n;
    btn.type = 'button';
    const hue = Math.round((item.n-1) * (300/NUMBERS.length));
    btn.style.background = `linear-gradient(145deg, hsl(${hue} 80% 65%), hsl(${hue} 80% 48%))`;
    btn.textContent = item.n;
    btn.addEventListener('click', ()=> openNumber(item.n));
    numGrid.appendChild(btn);
  });
}

function updateNumberStars(){
  numStarBadge.textContent = `⭐ ${learnedNumbers.size} / ${NUMBERS.length}`;
}

function openNumber(n){
  initAudio();
  const item = NUMBERS.find(x=> x.n === n);
  numBig.textContent = n;
  numWord.textContent = item.word;
  countRow.innerHTML = '';
  for(let i=0;i<n;i++){
    const span = document.createElement('span');
    span.textContent = item.emoji;
    span.className = 'count-icon';
    span.style.animationDelay = (i*0.08) + 's';
    countRow.appendChild(span);
  }
  numModal.classList.add('show');
  speak(`${n}. ${item.word}.`);

  if(!learnedNumbers.has(n)){
    learnedNumbers.add(n);
    updateNumberStars();
    burstConfetti();
    const tile = $('numtile-' + n);
    if(tile && !tile.querySelector('.tile-star')){
      const star = document.createElement('span');
      star.className = 'tile-star';
      star.textContent = '⭐';
      tile.appendChild(star);
    }
  }
}

function closeNumModal(){
  numModal.classList.remove('show');
  window.speechSynthesis.cancel();
}

// ===== Alphabet puzzles =====
function buildOptions(answer){
  const opts = new Set([answer]);
  while(opts.size < 3){
    opts.add(LETTER_KEYS[Math.floor(Math.random()*LETTER_KEYS.length)]);
  }
  const arr = Array.from(opts);
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  puzzleOptions.innerHTML = '';
  arr.forEach((opt)=>{
    const btn = document.createElement('button');
    btn.className = 'puzzle-opt';
    btn.type = 'button';
    btn.textContent = opt;
    btn.addEventListener('click', ()=> checkAnswer(opt, answer, btn));
    puzzleOptions.appendChild(btn);
  });
}

function buildMissingLetterPuzzle(){
  const maxStart = LETTER_KEYS.length - 4;
  const start = Math.floor(Math.random()*(maxStart+1));
  const seq = LETTER_KEYS.slice(start, start+4);
  const blankPos = 1 + Math.floor(Math.random()*2);
  const answer = seq[blankPos];

  puzzleQuestion.innerHTML = '';
  const label = document.createElement('p');
  label.textContent = 'Which letter is missing?';
  const row = document.createElement('div');
  row.className = 'seq-row';
  seq.forEach((ltr, idx)=>{
    const box = document.createElement('span');
    box.className = 'seq-box';
    box.textContent = idx === blankPos ? '?' : ltr;
    row.appendChild(box);
  });
  puzzleQuestion.appendChild(label);
  puzzleQuestion.appendChild(row);
  speak('Which letter is missing?');
  buildOptions(answer);
}

function buildPicturePuzzle(){
  const letter = LETTER_KEYS[Math.floor(Math.random()*LETTER_KEYS.length)];
  const data = LETTERS[letter];

  puzzleQuestion.innerHTML = '';
  const emojiBig = document.createElement('div');
  emojiBig.className = 'puzzle-emoji';
  emojiBig.textContent = data.emoji;
  const label = document.createElement('p');
  label.textContent = `Which letter does ${data.word} start with?`;
  puzzleQuestion.appendChild(emojiBig);
  puzzleQuestion.appendChild(label);
  speak(`Which letter does ${data.word} start with?`);
  buildOptions(letter);
}

function newPuzzle(){
  puzzleFeedback.textContent = '';
  if(Math.random() < 0.5) buildMissingLetterPuzzle();
  else buildPicturePuzzle();
}

function checkAnswer(selected, answer, btnEl){
  Array.from(puzzleOptions.children).forEach((b)=>{ b.disabled = true; });
  if(selected === answer){
    puzzleScoreCount++;
    puzzleScoreEl.textContent = `🧩 Score: ${puzzleScoreCount}`;
    puzzleFeedback.textContent = '🎉 Yes! Great job!';
    btnEl.classList.add('correct');
    speak('Yes! Great job!');
    burstConfetti(16);
  } else {
    puzzleFeedback.textContent = `Not quite — it's ${answer}.`;
    btnEl.classList.add('wrong');
    Array.from(puzzleOptions.children).forEach((b)=>{
      if(b.textContent === answer) b.classList.add('correct');
    });
    speak(`It's ${answer}. Let's try another one!`);
  }
  setTimeout(newPuzzle, 1800);
}

// ===== Tabs =====
function setupTabs(){
  const tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach((btn)=>{
    btn.addEventListener('click', ()=>{
      tabBtns.forEach((b)=> b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.querySelectorAll('.section').forEach((s)=> s.classList.remove('active'));
      $('section-' + tab).classList.add('active');
    });
  });
}

// ===== Background decorations =====
function buildFloaties(){
  const container = $('bgDecor');
  for(let i=0;i<16;i++){
    const el = document.createElement('span');
    el.className = 'floatie';
    el.textContent = FLOATIES[i % FLOATIES.length];
    el.style.left = Math.random()*92 + 'vw';
    el.style.top = Math.random()*92 + 'vh';
    el.style.fontSize = (1.6 + Math.random()*1.8) + 'rem';
    el.style.animationDuration = (4 + Math.random()*5) + 's';
    el.style.animationDelay = (Math.random()*4) + 's';
    container.appendChild(el);
  }
}

// ===== Init =====
function init(){
  grid = $('grid');
  modal = $('modal');
  modalUpper = $('modalUpper');
  modalLower = $('modalLower');
  modalEmoji = $('modalEmoji');
  modalWord = $('modalWord');
  starBadge = $('starBadge');
  songOverlay = $('songOverlay');
  songLetterEl = $('songLetter');
  songDotsEl = $('songDots');
  musicBtn = $('musicBtn');
  startOverlay = $('startOverlay');

  numGrid = $('numGrid');
  numModal = $('numModal');
  numBig = $('numBig');
  numWord = $('numWord');
  countRow = $('countRow');
  numStarBadge = $('numStarBadge');

  puzzleQuestion = $('puzzleQuestion');
  puzzleOptions = $('puzzleOptions');
  puzzleFeedback = $('puzzleFeedback');
  puzzleScoreEl = $('puzzleScore');

  buildFloaties();
  buildGrid();
  buildSongDots();
  updateLetterStars();
  buildNumberGrid();
  updateNumberStars();
  newPuzzle();
  setupTabs();

  $('closeModal').addEventListener('click', closeModal);
  modal.addEventListener('click', (e)=>{ if(e.target === modal) closeModal(); });
  $('hearAgain').addEventListener('click', ()=>{
    const letter = modalUpper.textContent;
    const data = LETTERS[letter];
    speak(`${letter}. ${letter} is for ${data.word}.`);
  });

  $('closeNumModal').addEventListener('click', closeNumModal);
  numModal.addEventListener('click', (e)=>{ if(e.target === numModal) closeNumModal(); });
  $('numHearAgain').addEventListener('click', ()=>{
    const n = Number(numBig.textContent);
    const item = NUMBERS.find(x=> x.n === n);
    speak(`${n}. ${item.word}.`);
  });

  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape'){ closeModal(); closeNumModal(); }
  });

  musicBtn.addEventListener('click', toggleMusic);
  $('songBtn').addEventListener('click', playABCSong);

  $('startBtn').addEventListener('click', ()=>{
    initAudio();
    scheduleBgLoop();
    startOverlay.classList.add('hide');
    setTimeout(()=> startOverlay.remove(), 700);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
